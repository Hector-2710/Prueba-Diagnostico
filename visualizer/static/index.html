<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Visualizer - D3.js</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #00d4ff; font-size: 2.5em; margin-bottom: 10px; }
        .header p { color: #999; font-size: 1.1em; }
        
        .stats { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box { 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            transition: all 0.3s ease;
        }
        .stat-box:hover { 
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.5);
        }
        .stat-box .value { 
            font-size: 2.5em;
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-box .label { 
            color: #999;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .chart-container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
        }
        .chart-container h3 { 
            margin-bottom: 20px;
            color: #00d4ff;
            font-size: 1.3em;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 10px;
        }
        
        .activity-log {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            max-height: 500px;
            overflow-y: auto;
        }
        .activity-log h3 { 
            margin-bottom: 15px;
            color: #00d4ff;
            font-size: 1.1em;
        }
        .activity-item { 
            padding: 10px;
            margin-bottom: 10px;
            background: rgba(0, 212, 255, 0.05);
            border-left: 3px solid #00d4ff;
            border-radius: 5px;
            font-size: 0.9em;
        }
        .activity-item .repo { color: #00d4ff; font-weight: bold; }
        .activity-item .lang { 
            display: inline-block;
            background: rgba(0, 212, 255, 0.2);
            padding: 2px 8px;
            border-radius: 3px;
            margin-left: 10px;
            font-size: 0.8em;
        }
        
        .bar {
            fill: url(#gradient);
        }
        .bar:hover {
            fill: #ff006e;
            opacity: 0.9;
        }
        
        .axis-label { font-size: 0.9em; color: #999; }
        .axis-line { stroke: rgba(255, 255, 255, 0.1); }
        
        #chart svg { width: 100%; height: auto; }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Visualizer</h1>
        </div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="value" id="reposAnalyzed">0</div>
                <div class="label">Repos Analizados</div>
            </div>
            <div class="stat-box">
                <div class="value" id="connectionStatus">●</div>
                <div class="label" id="connectionText">Conectando...</div>
            </div>
        </div>
        
        <div class="layout">
            <div class="chart-container">
                <h3>Top N Palabras Más Frecuentes</h3>
                <div id="chart"></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        let reposCount = 0;
        
        ws.onopen = () => {
            document.getElementById('connectionStatus').style.color = '#00ff55';
            document.getElementById('connectionText').textContent = 'Conectado';
        };
        
        ws.onmessage = (event) => {
            const message = JSON.parse(event.data);
            
            if (message.type === 'init') {
                updateStats(message.data);
            } else if (message.type === 'update') {
                reposCount++;
                updateStats(message.data);
                addToLog(message.repo, message.language, message.word_count);
            }
        };
        
        ws.onerror = () => {
            document.getElementById('connectionStatus').style.color = '#ff006e';
            document.getElementById('connectionText').textContent = 'Error';
        };
        
        ws.onclose = () => {
            document.getElementById('connectionStatus').style.color = '#ffa500';
            document.getElementById('connectionText').textContent = 'Desconectado';
        };
        
        function updateStats(data) {
            document.getElementById('reposAnalyzed').textContent = reposCount;
            updateChart(data.top);
        }
        
        function updateChart(data) {
            const margin = { top: 20, right: 30, bottom: 30, left: 150 };
            const containerWidth = document.getElementById('chart').offsetWidth;
            const width = Math.max(400, containerWidth - margin.left - margin.right);
            const height = 400;
            
            d3.select('#chart').selectAll('svg').remove();
            
            const svg = d3.select('#chart')
                .append('svg')
                .attr('width', width + margin.left + margin.right)
                .attr('height', height + margin.top + margin.bottom)
                .append('g')
                .attr('transform', `translate(${margin.left},${margin.top})`);
            
            // Gradiente
            const defs = svg.append('defs');
            const gradient = defs.append('linearGradient')
                .attr('id', 'gradient')
                .attr('x1', '0%').attr('y1', '0%')
                .attr('x2', '100%').attr('y2', '0%');
            gradient.append('stop').attr('offset', '0%').attr('stop-color', '#00d4ff');
            gradient.append('stop').attr('offset', '100%').attr('stop-color', '#00ffff');
            
            // Escalas
            const yScale = d3.scaleBand()
                .domain(data.map(d => d.word))
                .range([height, 0])
                .padding(0.1);
            
            const xScale = d3.scaleLinear()
                .domain([0, d3.max(data, d => d.count)])
                .range([0, width]);
            
            // Barras
            svg.selectAll('.bar')
                .data(data)
                .enter()
                .append('rect')
                .attr('class', 'bar')
                .attr('y', d => yScale(d.word))
                .attr('height', yScale.bandwidth())
                .attr('x', 0)
                .attr('width', 0)
                .transition()
                .duration(750)
                .attr('width', d => xScale(d.count));
            
            // Etiquetas de valores
            svg.selectAll('.bar-label')
                .data(data)
                .enter()
                .append('text')
                .attr('class', 'bar-label')
                .attr('x', d => xScale(d.count) + 5)
                .attr('y', d => yScale(d.word) + yScale.bandwidth() / 2)
                .attr('dy', '0.35em')
                .attr('fill', '#00d4ff')
                .attr('font-size', '0.85em')
                .text(d => d.count);
            
            // Ejes
            svg.append('g')
                .attr('class', 'axis-line')
                .attr('transform', `translate(0,${height})`)
                .call(d3.axisBottom(xScale).ticks(5));
            
            svg.append('g')
                .attr('class', 'axis-line')
                .call(d3.axisLeft(yScale));
        }
        
        updateChart([]);
    </script>
</body>
</html>
