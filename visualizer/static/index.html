<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Visualizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #00d4ff; font-size: 2.5em; margin-bottom: 10px; }
        
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
            flex-wrap: wrap;
            width: 100%;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
            flex: 1;
            min-width: 200px;
        }
        
        button, input {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.5);
            color: #00d4ff;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        button:hover:not(:disabled) {
            background: rgba(0, 212, 255, 0.2);
            border-color: rgba(0, 212, 255, 0.8);
        }
        
        button:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }
        
        button.active {
            background: rgba(0, 255, 85, 0.2);
            border-color: rgba(0, 255, 85, 0.8);
            color: #00ff55;
        }
        
        input[type="number"] {
            width: 100px;
            padding: 8px 12px;
        }
        
        label {
            color: #999;
            font-size: 0.9em;
        }
        
        .stats { 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-box { 
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box .value { 
            font-size: 2.5em;
            color: #00d4ff;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-box .label { 
            color: #999;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .main-content { 
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 212, 255, 0.2);
            padding: 30px;
            border-radius: 10px;
        }
        .main-content h3 { 
            margin-bottom: 20px;
            color: #00d4ff;
            font-size: 1.3em;
            border-bottom: 2px solid rgba(0, 212, 255, 0.2);
            padding-bottom: 10px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        
        th {
            background: rgba(0, 212, 255, 0.1);
            color: #00d4ff;
            padding: 12px;
            text-align: left;
            border: 1px solid rgba(0, 212, 255, 0.2);
            font-weight: bold;
        }
        
        td {
            padding: 12px;
            border: 1px solid rgba(0, 212, 255, 0.1);
        }
        
        tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }
        
        tr:nth-child(even) {
            background: rgba(0, 212, 255, 0.02);
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Visualizer</h1>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <button id="minerBtn" class="active">Detenido</button>
            </div>
            <div class="control-group">
                <label for="topN">Mostrar Top N:</label>
                <input type="number" id="topN" min="1" max="100" value="10">
                <button id="applyN">Aplicar</button>
            </div>
             <div class="control-group">
                <div class="value" id="reposAnalyzed">0</div>
                <div class="label">Repos Analizados</div>
            </div>
        </div>
        <div class="main-content">
            <h3>Top Palabras Más Frecuentes</h3>
            <table id="wordsTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Palabra</th>
                        <th>Cantidad</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const ws = new WebSocket(`ws://${window.location.host}/ws`);
        let reposCount = 0;
        let topN = 10;
        let minerRunning = false;
        
        const minerBtn = document.getElementById('minerBtn');
        const topNInput = document.getElementById('topN');
        const applyNBtn = document.getElementById('applyN');
        const tableBody = document.getElementById('tableBody');
        
        ws.onmessage = (event) => {
            const message = JSON.parse(event.data);
            
            if (message.type === 'init') {
                updateTable(message.data);
            } else if (message.type === 'update') {
                reposCount++;
                document.getElementById('reposAnalyzed').textContent = reposCount;
                updateTable(message.data);
            }
        };
    
        function updateTable(data) {
            tableBody.innerHTML = '';
            const topData = data.top.slice(0, topN);
            
            topData.forEach((item, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${index + 1}</strong></td>
                    <td>${item.word}</td>
                    <td><strong>${item.count}</strong></td>
                `;
                tableBody.appendChild(row);
            });
        }
        
        minerBtn.addEventListener('click', async () => {
            minerBtn.disabled = true;
            minerBtn.style.opacity = '0.5';
            
            try {
                if (minerRunning) {
                    const response = await fetch('/api/miner/stop', { method: 'POST' });
                    const result = await response.json();
                    minerRunning = false;
                    minerBtn.textContent = 'Detenido';
                    minerBtn.classList.remove('active');
                } else {
                    const response = await fetch('/api/miner/start', { method: 'POST' });
                    const result = await response.json();
                    if (result.running) {
                        minerRunning = true;
                        minerBtn.textContent = 'Ejecutando';
                        minerBtn.classList.add('active');
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            } finally {
                minerBtn.disabled = false;
                minerBtn.style.opacity = '1';
            }
        });
        
        applyNBtn.addEventListener('click', () => {
            topN = parseInt(topNInput.value) || 10;
            topN = Math.max(1, Math.min(100, topN));
            const tbody = document.getElementById('tableBody');
            if (tbody.children.length > 0) {
                ws.send('refresh');
            }
        });
        
        async function checkMinerStatus() {
            try {
                const response = await fetch('/api/miner/status');
                const result = await response.json();
                const wasRunning = minerRunning;
                minerRunning = result.running;
                
                if (minerRunning) {
                    minerBtn.textContent = 'Ejecutando';
                    minerBtn.classList.add('active');
                } else {
                    minerBtn.textContent = 'Detenido';
                    minerBtn.classList.remove('active');
                }
            } catch (error) {
                console.error('Error checking miner status:', error);
            }
        }
        
        setInterval(checkMinerStatus, 1000);
    </script>
</body>
</html>
